name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A31E93: ${{ secrets.A31E93 }}
          BB2340: ${{ secrets.BB2340 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A31E93', ''), os.environ.get('BB2340', '')
          total = 0
          for html in pathlib.Path('_site').rglob('*.html'):
              try:
                  text = html.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              patched = text
              if a:
                  patched = patched.replace('<!-- f90eb583b10c1b2b80c7a0 -->', a)
              if b:
                  patched = patched.replace('<!-- da8ca961bcabec07 -->', b)
              if patched != text:
                  html.write_text(patched, encoding='utf-8')
                  total += 1
          if total == 0 and (a or b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
